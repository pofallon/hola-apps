# get2know.io CMS — Hola app package (spec 012), CMS backend only.
#
# Serves the Payload admin (/admin) + REST/GraphQL API (/api) + Postgres. The
# PUBLIC site is built separately (`npm run -w apps/site-shell build:static`)
# and deployed to AWS Amplify — it is NOT served by this stack.
#
# Hola conventions (see try-hola/apps): prebuilt, digest-pinned images; bind
# mounts only under ${HOLA_APP_DATA}; NO host port bindings (Traefik fronts the
# manifest's ingress.service); real healthchecks.
services:
  web:
    # Built + pushed by get2knowio/site publish-cms-image.yml (on a cms-v* tag).
    # The IMAGE lives under the get2knowio org (the site repo's namespace); the
    # package/catalog stay under pofallon. Pinned by digest (immutable).
    image: ghcr.io/get2knowio/hola-get2know-cms-web:0.1.3@sha256:5b5c571b2a167479b1e75e91d4f17069bbebe96beee5493f340098802538a036
    # Wait for Postgres to actually accept TCP connections, THEN migrate, THEN
    # serve. `depends_on: service_healthy` (pg_isready) can pass during Postgres'
    # first-boot init window before the real server is listening on :5432, which
    # let an earlier build's `migrate` no-op against a not-yet-ready DB and start
    # the server against an empty schema (relation "users"/"posts" does not
    # exist). The explicit TCP wait closes that race; `&&` keeps a real migrate
    # failure fatal so the container restarts instead of serving a broken DB.
    # `payload migrate` needs Node >= 22.11 (deploy/Dockerfile pins 22.11.0-alpine).
    command:
      - sh
      - -c
      - |
        echo "Waiting for Postgres at db:5432…"
        until node -e "require('net').createConnection(5432,'db').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))" 2>/dev/null; do sleep 2; done
        npm run -w apps/site-shell migrate && npm run -w apps/site-shell start
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URI: postgres://payload:${POSTGRES_PASSWORD}@db:5432/payload
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      # Public origin of the admin/API — Hola injects the app's Traefik hostname.
      PAYLOAD_PUBLIC_SERVER_URL: https://${HOLA_APP_HOST}
      # Optional: fires the Amplify static rebuild when content is published.
      N8N_PUBLISH_WEBHOOK_URL: ${N8N_PUBLISH_WEBHOOK_URL:-}
      # Authentik OIDC (payload-oauth2 plugin). Hola provisions the client in
      # Authentik at deploy time and injects these three env vars here — see
      # manifest.json `auth.oidc.env`. The plugin is always enabled so the
      # authentik strategy + OAuth endpoints bake into the server bundle and
      # admin SPA at build time; these env vars resolve the real issuer/client/
      # secret at request time (the authorize/token/userinfo URLs are derived
      # from OIDC_ISSUER). This app is always Authentik-gated on Hola.
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
    volumes:
      # Media uploads must persist across redeploys (Payload staticDir).
      - ${HOLA_APP_DATA}/media:/app/apps/site-shell/public/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/admin').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: payload
    volumes:
      - ${HOLA_APP_DATA}/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d payload"]
      interval: 10s
      timeout: 5s
      retries: 12
