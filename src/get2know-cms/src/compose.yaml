# get2know.io CMS — Hola app package (spec 012), CMS backend only.
#
# Serves the Payload admin (/admin) + REST/GraphQL API (/api) + Postgres. The
# PUBLIC site is built separately (`npm run -w apps/site-shell build:static`)
# and deployed to AWS Amplify — it is NOT served by this stack.
#
# Hola conventions (see try-hola/apps): prebuilt, digest-pinned images; bind
# mounts only under ${HOLA_APP_DATA}; NO host port bindings (Traefik fronts the
# manifest's ingress.service); real healthchecks.
services:
  web:
    # Built + pushed by get2knowio/site publish-cms-image.yml (on a cms-v* tag).
    # The IMAGE lives under the get2knowio org (the site repo's namespace); the
    # package/catalog stay under pofallon. Pinned by digest (immutable).
    image: ghcr.io/get2knowio/hola-get2know-cms-web:0.1.8@sha256:09af98927b571f992d432b4101ad7e2a822a06ebe19010e54e7807f15fc220f8
    # Boot (wait-for-Postgres → conditional migrate → start) lives in the image
    # entrypoint (deploy/docker-entrypoint.sh) as of 0.1.5, so no command override
    # here. `migrate` runs only when `migrate:status` reports pending work, which
    # avoids the interactive dev-push prompt that hangs a non-TTY container when
    # the DB was restored from a dev-environment dump.
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URI: postgres://payload:${POSTGRES_PASSWORD}@db:5432/payload
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      # Public origin of the admin/API — Hola injects the app's Traefik hostname.
      PAYLOAD_PUBLIC_SERVER_URL: https://${HOLA_APP_HOST}
      # Optional: fires the Amplify static rebuild when content is published.
      N8N_PUBLISH_WEBHOOK_URL: ${N8N_PUBLISH_WEBHOOK_URL:-}
      # Authentik OIDC (payload-oauth2 plugin). Hola provisions the client in
      # Authentik at deploy time and injects these three env vars here — see
      # manifest.json `auth.oidc.env`. The plugin is always enabled so the
      # authentik strategy + OAuth endpoints bake into the server bundle and
      # admin SPA at build time; these env vars resolve the real issuer/client/
      # secret at request time (the authorize/token/userinfo URLs are derived
      # from OIDC_ISSUER). This app is always Authentik-gated on Hola.
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      # Static publish → AWS Amplify. On draft→published, the app builds the
      # static export and `deploy-static` pushes it to the STATIC Amplify app
      # (per-file create/start-deployment) after mirroring out/ to the ingest
      # bucket. Uses the AWS SDK (no aws-cli/zip in the image). The AWS_* creds
      # are the scoped get2know-static-deploy IAM user; empty values simply
      # disable auto-deploy (the CMS still runs).
      AMPLIFY_APP_ID: ${AMPLIFY_APP_ID:-}
      AMPLIFY_BRANCH_NAME: ${AMPLIFY_BRANCH_NAME:-main}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      DEPLOY_S3_BUCKET: ${DEPLOY_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      # Media uploads must persist across redeploys (Payload staticDir).
      - ${HOLA_APP_DATA}/media:/app/apps/site-shell/public/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Healthy = the server answers at all. /admin may 3xx-redirect to the OIDC
      # provider, so gating on r.ok would flap; any HTTP response means listening.
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/admin').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: payload
    volumes:
      - ${HOLA_APP_DATA}/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d payload"]
      interval: 10s
      timeout: 5s
      retries: 12
